<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#efece7" />
    <title>Tubekeep</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />
    <!-- No-FOUC theme init: apply saved dark/light before first paint. -->
    <script>
      (() => {
        try {
          const t = localStorage.getItem('tubekeepTheme')
          const dark =
            t === 'dark' ||
            (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)
          const root = document.documentElement
          root.classList.toggle('dark', dark)
          root.classList.toggle('light', !dark)
        } catch (_e) {}
      })()
    </script>
    <script id="tailwind-config">
      // Every color is a CSS variable holding a space-separated RGB triplet, so
      // Tailwind's `/opacity` modifiers keep working AND the whole palette flips
      // for dark mode by re-declaring the vars under `.dark` (see the <style> below).
      const c = (v) => `rgb(var(${v}) / <alpha-value>)`
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // ── Ink design tokens (semantic, used by new markup) ──
              bg: c('--bg'),
              paper: c('--paper'),
              ink: c('--ink'),
              muted: c('--muted'),
              faint: c('--faint'),
              line: c('--line'),
              line2: c('--line2'),
              fill: c('--fill'),
              'on-fill': c('--on-fill'),
              tint: c('--tint'),
              pop: c('--pop'),
              ok: c('--ok'),
              'ok-bg': c('--ok-bg'),

              // ── Legacy Material tokens, remapped onto Ink so existing
              //    class names recolor + flip for dark mode automatically. ──
              background: c('--bg'),
              'on-background': c('--ink'),
              surface: c('--surface'),
              'surface-bright': c('--surface'),
              'surface-dim': c('--tint'),
              'on-surface': c('--ink'),
              'surface-container-lowest': c('--surface'),
              'surface-container-low': c('--paper'),
              'surface-container': c('--tint'),
              'surface-container-high': c('--tint'),
              'surface-container-highest': c('--tint'),
              'surface-variant': c('--line'),
              'on-surface-variant': c('--muted'),
              'surface-tint': c('--pop'),
              'inverse-surface': c('--ink'),
              'inverse-on-surface': c('--paper'),
              outline: c('--line2'),
              'outline-variant': c('--line2'),
              primary: c('--fill'),
              'on-primary': c('--on-fill'),
              'primary-container': c('--ink'),
              'on-primary-container': c('--on-fill'),
              'primary-fixed': c('--tint'),
              'primary-fixed-dim': c('--faint'),
              'inverse-primary': c('--pop'),
              secondary: c('--muted'),
              'on-secondary': c('--on-fill'),
              'secondary-container': c('--tint'),
              'on-secondary-container': c('--ink'),
              'secondary-fixed': c('--tint'),
              'secondary-fixed-dim': c('--line2'),
              'on-secondary-fixed': c('--ink'),
              'on-secondary-fixed-variant': c('--muted'),
              tertiary: c('--ok'),
              'tertiary-container': c('--ok'),
              'tertiary-fixed': c('--ok-bg'),
              'tertiary-fixed-dim': c('--ok'),
              'on-tertiary': c('--on-fill'),
              'on-tertiary-container': c('--on-fill'),
              'on-tertiary-fixed': c('--ink'),
              'on-tertiary-fixed-variant': c('--ok'),
              error: c('--pop'),
              'error-container': c('--tint'),
              'on-error': c('--on-fill'),
              'on-error-container': c('--ink')
            },
            borderRadius: { DEFAULT: '0.25rem', lg: '0.5rem', xl: '0.75rem', full: '9999px' },
            spacing: {
              'stack-md': '24px',
              'stack-lg': '48px',
              'stack-sm': '12px',
              gutter: '24px',
              'margin-desktop': '40px',
              'margin-mobile': '16px',
              base: '8px',
              'container-max': '1200px'
            },
            fontFamily: {
              'headline-lg-mobile': ['Space Grotesk'],
              'headline-md': ['Space Grotesk'],
              'label-md': ['Space Grotesk'],
              'body-lg': ['Space Grotesk'],
              'display-lg': ['Space Grotesk'],
              'display-xl': ['Space Grotesk'],
              'headline-lg': ['Space Grotesk'],
              'body-md': ['Space Grotesk'],
              'label-sm': ['Space Grotesk'],
              headline: ['Space Grotesk'],
              display: ['Space Grotesk'],
              body: ['Space Grotesk'],
              label: ['Space Grotesk'],
              mono: ['ui-monospace', 'Menlo', 'monospace']
            },
            fontSize: {
              'headline-lg-mobile': ['24px', { lineHeight: '32px', fontWeight: '700' }],
              'headline-md': ['24px', { lineHeight: '32px', fontWeight: '600' }],
              'label-md': ['14px', { lineHeight: '20px', letterSpacing: '0.01em', fontWeight: '600' }],
              'body-lg': ['18px', { lineHeight: '28px', fontWeight: '400' }],
              'display-lg': ['48px', { lineHeight: '56px', letterSpacing: '-0.02em', fontWeight: '700' }],
              'display-xl': ['58px', { lineHeight: '60px', letterSpacing: '-0.035em', fontWeight: '700' }],
              'headline-lg': ['32px', { lineHeight: '40px', letterSpacing: '-0.01em', fontWeight: '700' }],
              'body-md': ['16px', { lineHeight: '24px', fontWeight: '400' }],
              'label-sm': ['12px', { lineHeight: '16px', fontWeight: '500' }]
            }
          }
        }
      }
    </script>
    <style>
      /* Ink palette as RGB triplets. Light is the default; `.dark` re-declares
         the same names so every token-based utility flips at once. `--pop` (the
         accent) is shared across both themes. */
      :root,
      .light {
        --bg: 239 236 231;
        --paper: 251 250 248;
        --surface: 255 255 255;
        --ink: 26 20 17;
        --muted: 122 114 107;
        --faint: 167 158 150;
        --line: 236 231 225;
        --line2: 222 215 207;
        --fill: 26 20 17;
        --on-fill: 255 255 255;
        --tint: 239 234 228;
        --pop: 226 58 36;
        --ok: 30 122 70;
        --ok-bg: 234 243 236;
      }
      .dark {
        --bg: 14 12 10;
        --paper: 20 18 16;
        --surface: 30 26 22;
        --ink: 243 239 233;
        --muted: 163 154 146;
        --faint: 111 102 95;
        --line: 44 38 33;
        --line2: 58 51 44;
        --fill: 243 239 233;
        --on-fill: 20 18 16;
        --tint: 41 35 30;
        --pop: 226 58 36;
        --ok: 95 208 139;
        --ok-bg: 23 37 28;
      }
      body {
        font-family: 'Space Grotesk', sans-serif;
        background: rgb(var(--bg));
      }
      .material-symbols-outlined {
        font-family: 'Material Symbols Rounded', sans-serif;
        font-weight: normal;
        font-style: normal;
        line-height: 1;
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        vertical-align: middle;
      }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgb(var(--line2)); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgb(var(--faint)); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
